<!DOCTYPE html>
<html>
<head>
<title>Melody Music App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#111;
    color:white;
}


header{
    background:#1db954;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
}


.hero{
    height:300px;
    text-align:center;
    padding:80px 20px;
    background:
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1516280440614-37939bbacd81");

    background-size:cover;
}


.hero h1{
    font-size:40px;
}


button{
    background:#1db954;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    margin-top:20px;
    cursor:pointer;
}


#songSection{
    display:none;
    padding:40px;
}


.song-container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}


.card{
    width:220px;
    background:#222;
    padding:20px;
    border-radius:15px;
    text-align:center;
}


.card img{
    width:150px;
    height:150px;
    border-radius:50%;
}


.card button{
    margin-top:10px;
}


.player{
    margin:30px;
    padding:25px;
    background:#222;
    border-radius:15px;
    text-align:center;
}


footer{
    background:#1db954;
    padding:15px;
    text-align:center;
}

</style>

</head>


<body>


<header>

<h1>🎵 Melody Music</h1>

<nav>
<a href="#">Home</a>
<a href="#">Songs</a>
<a href="#">About</a>
</nav>

</header>



<section class="hero">

<h1>Listen Your Favourite Music</h1>

<p>Unlimited songs anytime</p>

<button onclick="showSongs()">Start Listening</button>

</section>




<section id="songSection">


<h2>Popular Songs</h2>


<div class="song-container">


<div class="card">

<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">

<h3>Love Song</h3>

<p>Artist: Alex</p>

<button onclick="playSong('Love Song','Alex')">
▶ Play
</button>

</div>




<div class="card">

<img src="https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b">

<h3>Dream Music</h3>

<p>Artist: Emma</p>

<button onclick="playSong('Dream Music','Emma')">
▶ Play
</button>

</div>





<div class="card">

<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">

<h3>Night Beats</h3>

<p>Artist: John</p>

<button onclick="playSong('Night Beats','John')">
▶ Play
</button>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">

<h3>Rock Star</h3>

<p>Artist: Sam</p>

<button onclick="playSong('Rock Star','Sam')">
▶ Play
</button>

</div>


</div>

</section>





<div class="player">

<h2>Now Playing</h2>

<h3 id="songName">
No song selected
</h3>

<p id="artist">
-
</p>


</div>



<footer>

© 2026 Melody Music App

</footer>




<script>


function showSongs(){

document.getElementById("songSection").style.display="block";

}



function playSong(song,artist){

document.getElementById("songName").innerHTML=
"🎶 "+song;

document.getElementById("artist").innerHTML=
"Artist: "+artist;

alert("Now Playing: "+song);

}


</script>


</body>
</html>
